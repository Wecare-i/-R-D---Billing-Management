# Build & Deploy Billing Dashboard (React) to GitHub Pages
# Schedule: mỗi ngày 7h sáng (ICT = UTC+7 → 0:00 UTC)
# Manual: workflow_dispatch

name: Build & Deploy Dashboard

on:
  schedule:
    - cron: '0 0 * * *'  # Daily 00:00 UTC = 07:00 ICT
  workflow_dispatch:      # Manual trigger
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies
        run: npm ci

      - name: Fetch Azure data → data.json
        run: npm run build
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SP_CLIENT_ID: ${{ secrets.AZURE_SP_CLIENT_ID }}
          AZURE_SP_CLIENT_SECRET: ${{ secrets.AZURE_SP_CLIENT_SECRET }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_BILLING_ACCOUNT_1_ID: ${{ secrets.AZURE_BILLING_ACCOUNT_1_ID }}
          AZURE_BILLING_PROFILE_1_ID: ${{ secrets.AZURE_BILLING_PROFILE_1_ID }}
          AZURE_BILLING_ACCOUNT_2_ID: ${{ secrets.AZURE_BILLING_ACCOUNT_2_ID }}
          AZURE_BILLING_PROFILE_2_ID: ${{ secrets.AZURE_BILLING_PROFILE_2_ID }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

      - name: Install dashboard dependencies
        run: npm ci
        working-directory: ./dashboard

      - name: Build React dashboard
        run: npm run build
        working-directory: ./dashboard

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dashboard/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
